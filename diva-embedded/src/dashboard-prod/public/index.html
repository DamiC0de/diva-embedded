        // Domotique
        async loadDomotique() {
          try {
            this.domotiqueLoading = true;
            const statusRes = await fetch('/api/domotique/status');
            const status = await statusRes.json();
            this.haConnected = status.connected;
            this.haVersion = status.version || '';

            if (this.haConnected) {
              const devRes = await fetch('/api/domotique/devices');
              const devData = await devRes.json();
              this.allDevices = devData.devices || [];
              const haAreas = devData.areas || [];

              // Build room map — start with ALL HA areas (even empty ones)
              const roomMap = {};
              const icons = { 'salon': '\u{1F6CB}', 'cuisine': '\u{1F373}', 'chambre': '\u{1F6CF}', 'salle de bain': '\u{1F6BF}', 'bureau': '\u{1F4BB}', 'entree': '\u{1F6AA}', 'garage': '\u{1F698}', 'jardin': '\u{1F333}', 'chambre enfant': '\u{1F476}' };

              // Add all HA areas first (even without devices)
              for (const area of haAreas) {
                const key = area.name.toLowerCase();
                roomMap[area.name] = {
                  id: area.area_id,
                  name: area.name,
                  icon: icons[key] || '\u{1F3E0}',
                  devices: 0,
                  deviceList: [],
                  area_id: area.area_id,
                };
              }

              // Then assign devices to rooms
              this.allDevices.forEach(d => {
                if (d.room && roomMap[d.room]) {
                  roomMap[d.room].devices++;
                  roomMap[d.room].deviceList.push(d);
                }
              });

              // Compute lightsOn and temperature per room
              Object.values(roomMap).forEach(r => {
                r.lightsOn = r.deviceList.filter(d => (d.domain === 'light' || d.domain === 'switch') && d.state === 'on').length;
                const tempSensor = r.deviceList.find(d => d.domain === 'sensor' && d.attributes?.temperature);
                r.temperature = tempSensor ? tempSensor.state : null;
              });
              this.rooms = Object.values(roomMap);
              // Compute unassigned devices
              this.unassignedDevices = this.allDevices.filter(d => !d.room);
            }
            this.suggestedScenes = this.getSuggestedScenes();
          } catch (e) {
            console.error('Domotique load error:', e);
          } finally {
            this.domotiqueLoading = false;
          }
        },

        async toggleDevice(device) {
          const action = device.state === 'on' ? 'turn_off' : 'turn_on';
          try {
            await fetch('/api/domotique/control', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ entity_id: device.id, action }),
            });
            device.state = device.state === 'on' ? 'off' : 'on';
            this.addActivity('Dashboard', `${device.name} → ${device.state}`);
          } catch (e) {
            console.error('Toggle error:', e);
          }
        },

        // Story 18.5 / FR111: Interface progressive based on device count
        get interfaceLevel() {
          const count = this.allDevices.length;
          if (count < 5) return 'simple';
          if (count < 20) return 'standard';
          return 'advanced';
        },

        // Story 18.1: Toggle all lights in a room with single tap
        async toggleRoom(room) {
          const lights = (room.deviceList || []).filter(d => d.domain === 'light' || d.domain === 'switch');
          if (lights.length === 0) { this.selectedRoom = room; return; }
          const anyOn = lights.some(d => d.state === 'on');
          const action = anyOn ? 'turn_off' : 'turn_on';
          for (const light of lights) {
            try {
              await fetch('/api/domotique/control', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ entity_id: light.id, action }),
              });
              light.state = anyOn ? 'off' : 'on';
            } catch (e) { console.error('Room toggle error:', e); }
          }
          room.lightsOn = anyOn ? 0 : lights.length;
          this.addActivity('Dashboard', `${room.name} → tout ${anyOn ? 'OFF' : 'ON'}`);
        },

        /** Password strength indicator — computed properties */
        get wizardPasswordStrengthPct() {
          const p = this.wizardPassword;
          if (!p || p.length < 8) return 0;
          let score = 0;
          if (p.length >= 8)  score += 30;
          if (p.length >= 12) score += 20;
          if (/[A-Z]/.test(p)) score += 15;
          if (/[0-9]/.test(p)) score += 15;
          if (/[^A-Za-z0-9]/.test(p)) score += 20;
          return Math.min(score, 100);
        },
        get wizardPasswordStrengthClass() {
          const pct = this.wizardPasswordStrengthPct;
          if (pct === 0)  return '';
          if (pct < 50)  return 'strength-weak';
          if (pct < 75)  return 'strength-medium';
          return 'strength-strong';
        },
        get wizardPasswordStrengthLabel() {
          const pct = this.wizardPasswordStrengthPct;
          if (pct === 0)  return '';
          if (pct < 50)  return 'Faible';
          if (pct < 75)  return 'Moyen';
          return 'Fort';
        },

        async wizardSubmitStep4() {
          this.wizardError = '';
          this.wizardLoading = true;
          try {
            const res = await fetch('/api/wizard/step4', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },

            const data = await res.json();
            if (!data.success) {
              this.wizardError = data.error || 'Erreur lors de la sauvegarde des parametres.';
              return;
            }
            const nextStep = this.wizardHasDevices ? 7 : 5;
            this.wizardStep = nextStep;
            localStorage.setItem('diva_wizard_step', String(nextStep));
          } catch (e) {
            this.wizardError = 'Erreur reseau.';
          } finally {
            this.wizardLoading = false;
          }
        },

        /** Step 5/7 — Finalize wizard */
        async wizardFinalize() {
          this.wizardError = '';
          this.wizardLoading = true;
          try {
            const res = await fetch('/api/wizard/step5', { method: 'POST' });
            const data = await res.json();
            if (!data.success) {
              this.wizardError = data.error || 'Erreur lors de la finalisation.';
              return;
            }
            // Clear persisted step — wizard done
            localStorage.removeItem('diva_wizard_step');
            this.showWizard = false;
            this.authenticated = true;
            // Load dashboard data and show welcome message
            await this.loadData();
            this.welcomeMessage = data.data?.message || 'Bienvenue dans votre foyer Diva !';
            setTimeout(() => { this.welcomeMessage = ''; }, 5000);
          } catch (e) {
            this.wizardError = 'Erreur reseau.';
          } finally {
            this.wizardLoading = false;
          }
        },
      };
    }


    // Story 18.2 — WebSocket connection indicator (AC5, Task 7.2)
    function wsIndicator() {
      return {
        status: 'disconnected',
        dotClass: 'ws-dot-grey',
        label: '',

        init() {
          // Listen for WebSocket status changes
          const self = this;
          const checkWs = () => {
            if (window._divaWs) {
              window._divaWs.on('status_change', (data) => {
                self.updateStatus(data.status);
              });
              self.updateStatus(window._divaWs.status);
            } else {
              setTimeout(checkWs, 500);
            }
          };
          checkWs();
        },

        updateStatus(status) {
          this.status = status;
          switch (status) {
            case 'connected':
              this.dotClass = 'ws-dot-green';
              this.label = 'En direct';
              break;
            case 'reconnecting':
              this.dotClass = 'ws-dot-orange ws-dot-blink';
              this.label = 'Reconnexion...';
              break;
            case 'offline':
              this.dotClass = 'ws-dot-red';
              this.label = 'Hors ligne';
              break;
            default:
              this.dotClass = 'ws-dot-grey';
              this.label = '';
          }
        }
      };
    }
  </script>
